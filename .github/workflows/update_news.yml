# 파일 위치: .github/workflows/update_news.yml
name: Auto News Update

on:
  schedule:
    # 매시간 0분마다 자동으로 로봇을 작동시켜요 (UTC 기준이므로 매 시간 작동)
    - cron: '0 * * * *'
  # 개발자가 원할 때 깃허브 사이트에서 수동으로도 작동시킬 수 있어요
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      # 로봇이 깃허브에 새로 만든 데이터를 업로드할 권한을 줘요
      contents: write

    steps:
    # 1. 깃허브에 있는 코드들을 가져옵니다
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 파이썬 환경을 준비합니다
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-style: '3.10'
        cache-dependency-path: 'backend/requirements.txt'

    # 3. 필요한 도구(라이브러리)들을 설치합니다
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    # 4. 우리가 만든 업데이트용 파이썬 스크립트를 실행합니다
    - name: Run News Updater
      run: |
        python updater.py

    # 5. 로봇이 새로 수집한 파일(data_en.json, data_ko.json)을 저장소에 다시 올립니다
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add frontend/data_en.json frontend/data_ko.json
        # 변경 사항이 있을 때만 깃허브에 저장해요
        git diff-index --quiet HEAD || git commit -m "chore: auto-update global trends data"
        git push
